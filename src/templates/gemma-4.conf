model=unsloth/gemma-4-26B-A4B-it-qat-GGUF:UD-Q4_K_XL

--temp 1.0
--top-p 0.95

[mlx]
--max-tokens 4096

[mlx.serve]
--top-k 64
--min-p 0.0

[llama.cpp]
--top-k 64
--min-p 0.0
--repeat-penalty 1.05
--presence-penalty 0.0
--frequency-penalty 0.0
--gpu-layers all
--ctx-size 65536
--parallel 1
--flash-attn on
--cache-type-k q8_0
--cache-type-v q8_0
--batch-size 2048
--ubatch-size 512
--n-predict 4096
--reasoning auto

## Uncomment for MTP drafting
# --spec-type draft-mtp
# --spec-draft-n-max 3

[llama.cpp.serve]
--cache-reuse 256
--cache-prompt
